<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC Good dApp - Camera QR Scanner</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f4f8ff 0%, #ffffff 70%);
      color: #0f1a36;
    }

    .container {
      box-sizing: border-box;
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    p {
      line-height: 1.5;
      color: #36456b;
    }

    .card {
      background: #fff;
      border: 1px solid #dbe6ff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(29, 64, 155, 0.08);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    #start {
      background: #0b67ff;
      color: #fff;
    }

    #stop {
      background: #e8eefc;
      color: #17244a;
    }

    #status {
      margin-top: 10px;
      font-weight: 600;
      color: #1e2e56;
      word-break: break-word;
    }

    video {
      width: 100%;
      margin-top: 14px;
      border-radius: 12px;
      border: 1px solid #d7e3ff;
      background: #0d1119;
      min-height: 220px;
      object-fit: cover;
    }

    .origin {
      margin-top: 8px;
      font-size: 12px;
      color: #5b6789;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>[POC] Camera QR Scanner</h1>
    <p>
      This simulates a legitimate dApp that needs camera access to scan a QR code for wallet actions.
      Click <strong>Start QR Scan</strong> to request camera.
    </p>

    <section class="card">
      <div class="actions">
        <button id="start" type="button">Start QR Scan</button>
        <button id="stop" type="button">Stop Camera</button>
      </div>
      <div id="status">Idle</div>
      <div class="origin" id="origin"></div>
      <video id="preview" autoplay playsinline muted></video>
    </section>
  </main>

  <script>
    const startButton = document.getElementById('start');
    const stopButton = document.getElementById('stop');
    const statusElement = document.getElementById('status');
    const originElement = document.getElementById('origin');
    const preview = document.getElementById('preview');

    let currentStream;
    originElement.textContent = `Origin: ${window.location.origin}`;

    function stopStream() {
      if (!currentStream) return;
      currentStream.getTracks().forEach((track) => track.stop());
      preview.srcObject = null;
      currentStream = undefined;
      statusElement.textContent = 'Camera stopped';
    }

    async function startScan() {
      stopStream();
      statusElement.textContent = 'Requesting camera permission...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false,
        });
        currentStream = stream;
        preview.srcObject = stream;
        statusElement.textContent = `Camera active (${stream.getVideoTracks().length} track)`;
      } catch (error) {
        statusElement.textContent = `Camera request failed: ${error.name}`;
      }
    }

    startButton.addEventListener('click', startScan);
    stopButton.addEventListener('click', stopStream);
    window.addEventListener('pagehide', stopStream);
  </script>
</body>
</html>
