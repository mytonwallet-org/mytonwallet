# Terms:
# "build" - Compile web project using webpack.
# "package" - Produce a distributive package for a specific platform as a workflow artifact.
# "publish" - Send a package to corresponding store and GitHub release page.
# "release" - build + package + publish
#
# Jobs in this workflow will skip the "publish" step when `PUBLISH_REPO` is not set.

name: Package and publish

on:
  workflow_dispatch:
  push:
    # branches:
      # - master

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: MyTonWallet
  PROXY_HOSTS: ${{ vars.PROXY_HOSTS }}
  STAKING_POOLS: ${{ vars.STAKING_POOLS }}
  PUBLISH_REPO: ${{ vars.PUBLISH_REPO }}
  BRILLIANT_API_BASE_URL: ${{ vars.BRILLIANT_API_BASE_URL }}
  SWAP_FEE_ADDRESS: ${{ vars.SWAP_FEE_ADDRESS }}
  DIESEL_ADDRESS: ${{ vars.DIESEL_ADDRESS }}
  WALLET_CONNECT_PROJECT_ID: ${{ vars.WALLET_CONNECT_PROJECT_ID }}
  AGENT_API_URL: ${{ vars.AGENT_API_URL }}

jobs:

  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      android-only: ${{ steps.filter.outputs.android-only }}
      ios-only: ${{ steps.filter.outputs.ios-only }}
      electron-changed: ${{ steps.filter.outputs.electron-changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "android-only=false" >> "$GITHUB_OUTPUT"
            echo "ios-only=false" >> "$GITHUB_OUTPUT"
            echo "electron-changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — building all platforms"
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          # Check if ALL changes are exclusively in mobile/android/ or mobile/ios/
          ANDROID_ONLY="true"
          IOS_ONLY="true"
          ELECTRON_CHANGED="false"
          while IFS= read -r file; do
            if [[ ! "$file" =~ ^mobile/android/ ]]; then
              ANDROID_ONLY="false"
            fi
            if [[ ! "$file" =~ ^mobile/ios/ ]]; then
              IOS_ONLY="false"
            fi
            if [[ "$file" =~ ^src/electron/ ]]; then
              ELECTRON_CHANGED="true"
            fi
          done <<< "$CHANGED"

          echo "android-only=$ANDROID_ONLY" >> "$GITHUB_OUTPUT"
          echo "ios-only=$IOS_ONLY" >> "$GITHUB_OUTPUT"
          echo "electron-changed=$ELECTRON_CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          echo "$CHANGED"
          echo "android-only=$ANDROID_ONLY, ios-only=$IOS_ONLY, electron-changed=$ELECTRON_CHANGED"


