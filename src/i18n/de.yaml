$safety_rules_private_key_one: |
  Auf dem nächsten Bildschirm sehen Sie den **%chain%-Privatschlüssel**. Speichern Sie ihn korrekt und **bewahren Sie ihn an einem sicheren Ort** auf.
$safety_rules_private_key_two: Er ermöglicht es Ihnen, Ihre **Wallet zu öffnen**, wenn Sie Ihr Passwort oder den Zugriff auf dieses Gerät verlieren.
$safety_rules_private_key_three: Wenn jemand anderes diesen privaten Schlüssel sieht, können Ihre Gelder **gestohlen werden**. **Senden oder zeigen Sie ihn niemandem**, auch nicht Entwicklern oder technischem Support.
$safety_rules_one: |
  Auf dem nächsten Bildschirm sehen Sie die **geheimen Wörter**. Notieren Sie sie in der richtigen Reihenfolge und **bewahren Sie sie an einem sicheren Ort auf**.
$safety_rules_two: Sie ermöglichen es, Ihre **wallet zu öffnen**, falls Sie Ihr Passwort vergessen oder den Zugang zu diesem Gerät verlieren.
$safety_rules_three: Wenn jemand anderes diese Wörter sieht, könnten Ihre **Gelder gestohlen werden**. **Senden Sie es an niemanden**, nicht einmal an Entwickler oder den technischen Support.
