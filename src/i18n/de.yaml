$domain_like_scam_warning: |
  Die eingegebene Adresse ist wahrscheinlich ein **BETRUG**. Dies ist **KEINE** Adresse einer Börse oder Ihres Token-Wallets.

  Dies ist eine lange **Domain**, die **Betrüger** verwenden, um Menschen zu überzeugen, dass sie Token an eine bekannte Adresse senden.

  **Brechen Sie** diese Überweisung ab und **vertrauen Sie niemals** Fremden. Erfahren Sie mehr über diesen und andere Betrugsmethoden in unserem %help_center_link%.
