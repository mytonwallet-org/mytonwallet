$domain_like_scam_warning: |
  Girilen adres büyük olasılıkla bir **DOLANDIRICILIKTIR**. Bu, herhangi bir borsanın veya token cüzdanınızın adresi **DEĞİLDİR**.

  Bu, dolandırıcıların insanları tokenları bilinen bir adrese gönderdiklerine inandırmak için kullandıkları uzun bir **alandır**.

  Bu transferi **İptal edin** ve yabancılara asla **güvenmeyin**. Bu ve diğer dolandırıcılık yöntemleri hakkında daha fazla bilgi için %help_center_link%'mizi ziyaret edin.
