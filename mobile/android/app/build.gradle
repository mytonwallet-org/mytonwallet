apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'

android {
  packaging {
    jniLibs {
      useLegacyPackaging = true
    }
  }
  namespace = "org.mytonwallet.app"
  compileSdk = rootProject.ext.compileSdkVersion
  // Source compatibility moved here from the (no-longer-applied) generated
  // capacitor.build.gradle.
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_21
    targetCompatibility JavaVersion.VERSION_21
  }
  defaultConfig {
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode 1
    versionName "1.0"
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    aaptOptions {
      // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
      // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
      ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
  }
  signingConfigs {
    named("debug") {
      storeFile = rootProject.file(
        project.findProperty("DEBUG_STORE_FILE") as String
      )
      storePassword = project.findProperty("DEBUG_STORE_PASSWORD") as String
      keyAlias = project.findProperty("DEBUG_KEY_ALIAS") as String
      keyPassword = project.findProperty("DEBUG_KEY_PASSWORD") as String
    }
  }

  // Capacitor's `cap sync` writes generated assets/res into src/main/
  // (assets/public/, assets/capacitor.*.json, res/xml/config.xml,
  // res/values*/web_permission_strings.xml). Those are mytonwallet-only —
  // re-root `main` to res-shared/ (truly shared static resources), and let
  // the mytonwallet flavor pull in src/main/{res,assets} on top. The gram
  // flavor never sees the Capacitor-generated paths.
  sourceSets {
    main {
      res.srcDirs = ['src/main/res-shared']
      assets.srcDirs = []
    }
    mytonwallet {
      res.srcDirs += ['src/main/res']
      assets.srcDirs += ['src/main/assets']
    }
    // Gram drops the rest of src/main/assets (Capacitor web bundle), but Air
    // native code still loads i18n JSONs from assets, so re-include just that
    // subdir for gram. Contents land at <assets-root>/<lang>.json.
    gram {
      assets.srcDirs += ['src/main/assets/public/i18n']
    }
  }

  flavorDimensions "brand", "env"
  productFlavors {
    mytonwallet {
      dimension "brand"
      applicationId "org.mytonwallet.app"
      getIsDefault().set(true)
    }
    gram {
      dimension "brand"
      applicationId "io.gramwallet.app"
    }
    prod {
      dimension "env"
    }
    beta {
      dimension "env"
      applicationIdSuffix ".beta"
      versionNameSuffix ".beta"
    }
  }

  variantFilter { variant ->
    def flavors = variant.flavors*.name
    def buildType = variant.buildType.name
    if (flavors.contains("beta") && buildType == "debug") {
      variant.ignore = true
    }
  }

  buildTypes {
    debug {
      applicationIdSuffix = ".debug"
      versionNameSuffix = ".debug"

      firebaseCrashlytics {
        mappingFileUploadEnabled false
      }
    }
    release {
      minifyEnabled true
      shrinkResources true
      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
      // signingConfig signingConfigs.debug
    }
  }
}

repositories {
  flatDir {
    dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
  }
}

dependencies {
  implementation fileTree(include: ['*.jar'], dir: 'libs')
  implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
  implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
  implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
  implementation "androidx.webkit:webkit:$androidxWebkitVersion"
  // FilesystemPlugin uses Dispatchers.Main during teardown and needs the Android dispatcher at runtime.
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$kotlinxCoroutinesVersion"
  testImplementation "junit:junit:$junitVersion"
  androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
  androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
  // Gram flavor: thin-client (model downloads on demand via Play Services).
  // mytonwallet flavor uses bundled MLKit pulled in via :capacitor-mlkit-barcode-scanning,
  // which also brings camera-camera2 transitively.
  gramImplementation "com.google.android.gms:play-services-mlkit-barcode-scanning:$playServicesMlkitBarcodeScanningVersion"
  gramImplementation "com.google.android.gms:play-services-base:$playServicesBaseVersion"
  gramImplementation "androidx.camera:camera-camera2:$cameraCamera2Version"
  implementation platform('com.google.firebase:firebase-bom:33.5.1')
  implementation 'com.google.firebase:firebase-messaging'

  // Capacitor lives only in the mytonwallet flavor — the gram flavor is
  // Air-only and never instantiates BridgeActivity. The generated
  // capacitor.build.gradle (regenerated by `cap sync`) is intentionally not
  // applied because it binds plugins to `implementation` (all variants).
  // When `capacitor.config.ts` gains/loses a plugin, mirror the change here.
  mytonwalletImplementation project(':capacitor-android')
  mytonwalletImplementation project(':capacitor-cordova-android-plugins')
  mytonwalletImplementation project(':capacitor-community-bluetooth-le')
  mytonwalletImplementation project(':capacitor-mlkit-barcode-scanning')
  mytonwalletImplementation project(':capacitor-app')
  mytonwalletImplementation project(':capacitor-app-launcher')
  mytonwalletImplementation project(':capacitor-clipboard')
  mytonwalletImplementation project(':capacitor-dialog')
  mytonwalletImplementation project(':capacitor-filesystem')
  mytonwalletImplementation project(':capacitor-haptics')
  mytonwalletImplementation project(':capacitor-keyboard')
  mytonwalletImplementation project(':capacitor-push-notifications')
  mytonwalletImplementation project(':capacitor-share')
  mytonwalletImplementation project(':capacitor-status-bar')
  mytonwalletImplementation project(':capgo-capacitor-native-biometric')
  mytonwalletImplementation project(':capgo-native-audio')
  mytonwalletImplementation project(':mauricewegner-capacitor-navigation-bar')
  mytonwalletImplementation project(':mytonwallet-air-app-launcher')
  mytonwalletImplementation project(':mytonwallet-capacitor-usb-hid')
  mytonwalletImplementation project(':capacitor-native-settings')
  mytonwalletImplementation project(':capacitor-plugin-safe-area')
  mytonwalletImplementation project(':capacitor-secure-storage-plugin')

  // Air launcher (universal) — provides AirLauncher/LaunchConfig used by
  // MainActivity in both flavors. Its Capacitor Plugin shell is gated by an
  // internal `brand` flavor and only landed on the mytonwallet variant.
  gramImplementation project(':mytonwallet-air-app-launcher')
}

// Cordova ext-vars script (`cdvMinSdkVersion`, `cordovaConfig`, …) is required
// by the `:capacitor-cordova-android-plugins` Gradle module's evaluation. It
// emits no dependencies on its own, so applying it always is harmless even in
// the gram build (which doesn't depend on cordova-android-plugins).
apply from: '../capacitor-cordova-android-plugins/cordova.variables.gradle'
